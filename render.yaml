services:
  # ── Express API ─────────────────────────────────────────────────────────────
  - type: web
    name: multiholidays-api
    runtime: node
    rootDir: .
    buildCommand: npm install
    startCommand: node Server/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false          # set manually in Render dashboard (secret)
      - key: JWT_SECRET
        sync: false          # set manually in Render dashboard (secret)
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_ORIGIN
        # Replace with your actual web service URL after first deploy
        value: https://multiholidays-web.onrender.com

  # ── Next.js Web ─────────────────────────────────────────────────────────────
  - type: web
    name: multiholidays-web
    runtime: node
    rootDir: Client
    buildCommand: npm install && npm run build
    startCommand: node .next/standalone/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: NEXT_PUBLIC_API_URL
        # Replace with your actual API service URL after first deploy
        value: https://multiholidays-api.onrender.com/api
      - key: NEXT_PRIVATE_API_URL
        # Use the internal Render URL for server-to-server calls (faster, no egress cost)
        # Format: http://<service-name>:<port>/api  (Render internal network)
        # Replace with: http://multiholidays-api:10000/api  after both services are created
        value: https://multiholidays-api.onrender.com/api
