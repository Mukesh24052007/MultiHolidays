services:
  # ── Express API ─────────────────────────────────────────────────────────────
  - type: web
    name: multiholidays-api
    runtime: node
    rootDir: .
    buildCommand: npm install
    startCommand: node Server/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false          # set manually in Render dashboard (secret)
      - key: JWT_SECRET
        sync: false          # set manually in Render dashboard (secret)
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_ORIGIN
        # Replace with your actual web service URL after first deploy
        value: https://multiholidays.onrender.com

  # ── Next.js Web ─────────────────────────────────────────────────────────────
  - type: web
    name: multiholidays-web
    runtime: node
    rootDir: Client
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://multiholidays-api.onrender.com/
      - key: NEXT_PRIVATE_API_URL
        value: https://multiholidays-api.onrender.com/
