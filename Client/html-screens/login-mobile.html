<style>
        body {
            background-color: #f7f9fb;
            font-family: 'Hanken Grotesk', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .input-focus-ring:focus {

            border-color: #004ac6;

        @media (max-width: 767px) {
            .mobile-container {

    body {
      min-height: max(884px, 100dvh);
    }

<body class="text-on-background">
<!-- Login Shell -->
<main class="mobile-container flex flex-col justify-center items-center px-sm py-xl max-w-md mx-auto relative overflow-hidden">
<!-- Background Atmospheric Element (Subtle) -->
<div class="absolute -top-24 -right-24 w-64 h-64 bg-primary/5 rounded-full blur-3xl"></div>
<div class="absolute -bottom-24 -left-24 w-64 h-64 bg-secondary/5 rounded-full blur-3xl"></div>
<!-- Brand Identity Section -->
<header class="w-full text-center mb-xl relative z-10">
<div class="flex flex-col items-center gap-xs">
<div class="w-16 h-16 bg-primary rounded-xl flex items-center justify-center mb-md shadow-sm">
<span class="material-symbols-outlined text-white text-[40px]" style="font-variation-settings: 'FILL' 1;">calendar_month</span>
</div>
<h1 class="font-headline-xl text-headline-xl text-primary tracking-tight">MultiHolidays</h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[280px] mx-auto">
                    Secure student portal for attendance and academic leave management.
                </p>
</div>
</header>
<!-- Login Form Card -->
<section class="w-full bg-surface-container-lowest p-md rounded-xl border border-outline-variant shadow-sm relative z-10">
<form action="#" class="space-y-md" method="POST">
<!-- Email Field -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface" for="email">Institutional Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline text-md">mail</span>
<input class="w-full pl-[48px] pr-sm py-md bg-surface border border-outline-variant rounded-lg font-body-md text-body-md input-focus-ring transition-all placeholder:text-outline/50" id="email" name="email" placeholder="student@university.edu" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:underline" href="#">Forgot?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline text-md">lock</span>
<input class="w-full pl-[48px] pr-sm py-md bg-surface border border-outline-variant rounded-lg font-body-md text-body-md input-focus-ring transition-all placeholder:text-outline/50" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-sm top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-md">visibility</span>
</button>
</div>
</div>
<!-- Action Button -->
<button class="w-full py-md px-lg bg-primary text-white font-label-md text-label-md rounded-lg shadow-sm hover:bg-primary/90 active:scale-[0.98] transition-all flex items-center justify-center gap-xs" type="submit">
                    Login to Dashboard
                    <span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</form>
<div class="mt-xl pt-md border-t border-outline-variant text-center">
<p class="font-body-md text-body-md text-on-surface-variant mb-sm">New to the system?</p>
<button class="w-full py-md px-lg border border-primary text-primary font-label-md text-label-md rounded-lg hover:bg-primary/5 active:scale-[0.98] transition-all" type="button">
                    Apply for Access
                </button>
</div>
</section>
<!-- Auxiliary Links -->
<footer class="mt-xl text-center space-y-md relative z-10">
<div class="flex items-center justify-center gap-md">
<a class="font-label-sm text-label-sm text-on-secondary-fixed-variant hover:text-on-surface transition-colors" href="#">Terms of Service</a>
<span class="w-1 h-1 bg-outline rounded-full"></span>
<a class="font-label-sm text-label-sm text-on-secondary-fixed-variant hover:text-on-surface transition-colors" href="#">Privacy Policy</a>
</div>
<p class="font-label-sm text-label-sm text-outline">
                © 2024 MultiHolidays. All rights reserved.
            </p>
</footer>
</main>
<!-- Micro-interactions Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const passwordInput = document.getElementById('password');
            const toggleBtn = passwordInput.nextElementSibling;
            
            toggleBtn.addEventListener('click', () => {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                toggleBtn.querySelector('span').textContent = type === 'password' ? 'visibility' : 'visibility_off';
            });

            // Input field focus interaction
            const inputs = document.querySelectorAll('input');
            inputs.forEach(input => {
                input.addEventListener('focus', () => {
                    input.parentElement.previousElementSibling.classList.add('text-primary');
                });
                input.addEventListener('blur', () => {
                    input.parentElement.previousElementSibling.classList.remove('text-primary');
                });
            });
        });
    </script>
</body></html>
